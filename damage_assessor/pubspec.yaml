name: damage_assessor
description: AI-powered vehicle damage assessment app for insurance experts.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management, routing, DI
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # Networking
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.2.2

  # Camera / images
  camera: 0.10.5+9
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # PDF preview
  flutter_pdfview: ^1.3.2

  # Sharing / files
  share_plus: ^10.0.2
  path_provider: ^2.1.3
  url_launcher: ^6.3.0

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true # enables l10n codegen from l10n.yaml
